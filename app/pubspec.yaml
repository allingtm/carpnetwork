name: carp_network
description: "Carp.Network — Private fishing group mobile app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Core
  supabase_flutter: ^2.0.0
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0
  go_router: ^14.0.0

  # Offline
  brick_core: ^2.0.0
  brick_offline_first: ^4.0.0
  brick_offline_first_with_supabase: ^2.1.0
  brick_sqlite: ^4.0.0
  brick_supabase: ^2.1.0
  drift: ^2.0.0
  sqflite: ^2.0.0
  sqflite_common: ^2.5.0
  path_provider: ^2.0.0
  path: ^1.9.0
  http: ^1.0.0

  # Storage
  flutter_secure_storage: ^9.0.0

  # Image
  image_picker: ^1.0.0
  image: ^4.0.0
  cached_network_image: ^3.0.0

  # Push
  firebase_messaging: ^15.0.0
  firebase_core: ^3.0.0

  # Payments
  purchases_flutter: ^9.12.0

  # Background
  workmanager: ^0.5.0
  connectivity_plus: ^6.0.0

  # Sharing
  share_plus: ^10.0.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.0.0
  brick_offline_first_with_supabase_build: ^2.1.0
  freezed: ^3.2.0
  json_serializable: ^6.0.0
  riverpod_generator: ^4.0.0
  drift_dev: ^2.0.0

flutter:
  uses-material-design: true
